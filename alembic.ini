# Alembic configuration for the NESpresso bot.
#
# NOTE: the database URL below is a PLACEHOLDER and is intentionally NOT the real
# DSN. `alembic/env.py` overrides `sqlalchemy.url` at runtime from
# `nespresso.core.configs.settings.settings.POSTGRES_DSN` (the same source the app
# uses), so credentials live only in `.env` and are never committed here.

[alembic]
# Path to migration scripts (relative to this file / the invocation dir).
script_location = alembic

# Prepend the repo root to sys.path so `import alembic` picks up this config dir.
# (env.py additionally adds `src/` so the `nespresso` package is importable.)
prepend_sys_path = .

# Template used to generate new migration filenames: a zero-padded date prefix
# keeps `versions/` sorted chronologically alongside the revision hash.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Separator for the script_location / version_locations paths.
path_separator = os

# Timezone for the date rendered into migration files (blank = local time).
# timezone =

# Placeholder only — env.py sets the real (async) DSN from settings at runtime.
# Kept non-empty so `async_engine_from_config` has a section to start from.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost:5432/nespresso


# Logging configuration. ------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
